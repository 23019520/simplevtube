<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: relative;
    }
    #emote-sprite {
      width: 100%;
      height: 100%;
      object-fit: contain;
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
      /* Hidden by default. Playback toggles opacity only — the window
         itself stays mapped/visible permanently (see tauri.conf.json and
         window_manager.rs's setup_emote_window doc comment) to avoid the
         show()/hide() timing races we hit earlier with the Character
         Window. A pure CSS toggle has no such race. */
      opacity: 0;
      transition: opacity 80ms ease;
    }
    #emote-sprite.visible {
      opacity: 1;
    }

    /* v1.6: shown only while reposition mode is active, so there's
       something visible to see/drag/resize even when no emote is
       currently playing (or none has been created yet). */
    #placeholder {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      box-sizing: border-box;
      border: 2px dashed rgba(255, 255, 255, 0.75);
      border-radius: 10px;
      background: rgba(255, 122, 89, 0.18);
      color: white;
      font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      -webkit-user-select: none;
      user-select: none;
    }
    body.reposition-mode #placeholder {
      display: flex;
    }
  </style>
</head>
<body>
  <img id="emote-sprite" src="" alt="" draggable="false" />
  <div id="placeholder">Drag to move &middot; drag an edge to resize</div>
  <script src="render.js"></script>
</body>
</html>
