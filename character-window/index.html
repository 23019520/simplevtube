<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #sprite {
      width: 100%;
      height: 100%;
      object-fit: contain;
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="sprite" src="" alt="" draggable="false" />
  <script src="render.js"></script>
</body>
</html>
